<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: "Source Sans Pro", "Arial", sans-serif;
    white-space: normal;
    padding: 20px;
  }

  h1 {
    font-size: 250%;
    font-weight: 900; /* Ultra Bold */
    /* Text Decoration */
    text-decoration: underline;
    /* Visual Effects */
    text-shadow: 2px 2px 4px #888888;
  }

  .variant-demo {
    font-variant: small-caps;
    font-size: 24px;
  }

  .spacing-demo {
    letter-spacing: 5px;
    word-spacing: 15px;
    line-height: 2.0;
  }

  .transform-demo {
    text-transform: uppercase;
    color: darkblue;
  }

  .preserve-space {
    white-space: pre-wrap;
    background-color: #f0f0f0;
    border: 1px solid #ccc;
  }
</style>
</head>
<body>

  <h1>Lesson 1 Typography</h1>
  
  <p class="variant-demo">This text uses small-caps variant.</p>
  
  <p class="spacing-demo">Adjusted letter and word spacing with double line height.</p>
  
  <p class="transform-demo">This text was typed in lowercase but transformed to uppercase.</p>
  
  <div class="preserve-space">
    This div
    uses pre-wrap
    to preserve 
    line breaks and    extra spaces.
  </div>

</body>
</html>
